<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NISH STORE</title>

<style>
/* === ORIGINAL STYLE — UNCHANGED === */
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#06142e,#020d1f);
color:white;
padding:15px;
padding-bottom:150px;
}

.header{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:25px;
color:#00e0ff;
text-shadow:0 0 10px #00e0ff;
}

.success-msg{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#00c853;
padding:12px 25px;
border-radius:30px;
display:none;
z-index:2000;
box-shadow:0 0 20px #00ffcc;
}

.admin-btn{
position:fixed;
top:15px;
right:15px;
background:linear-gradient(45deg,#00e0ff,#00ffcc);
border:none;
padding:10px 18px;
border-radius:25px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #00ffcc;
}

.admin-panel{
position:fixed;
top:70px;
right:15px;
background:#0d1b3d;
padding:15px;
border-radius:15px;
display:none;
box-shadow:0 0 20px #00e0ff;
z-index:1000;
}

.section{margin-bottom:40px;}
.section h2{
color:#00e0ff;
border-left:4px solid #00ffcc;
padding-left:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
padding:15px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.2);
text-align:center;
box-shadow:0 0 10px rgba(0,255,255,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 20px #00ffcc;
}

.price{
color:#00ffcc;
font-weight:bold;
margin-top:5px;
cursor:pointer;
}

.counter{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.counter button{
width:32px;
height:32px;
border:none;
border-radius:50%;
background:#00c2d1;
color:white;
font-size:18px;
cursor:pointer;
}

.bottom-bar{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:rgba(0,0,0,0.9);
border-radius:30px;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
box-shadow:0 0 20px #00e0ff;
}

.next-btn{
background:linear-gradient(45deg,#00ffcc,#00e0ff);
border:none;
padding:10px 25px;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 NISH OFFICIAL STORE 🔥</div>

<div class="success-msg" id="successMsg">
Price Changed Successfully ✅
</div>

<button class="admin-btn" onclick="adminLogin()">ADMIN</button>

<div class="admin-panel" id="adminPanel">
<h3>Admin Panel Active 🔥</h3>
<button onclick="logoutAdmin()" 
style="margin-top:10px;background:red;border:none;padding:8px 15px;border-radius:20px;color:white;cursor:pointer;">
Logout
</button>
</div>

<div id="products"></div>

<div class="bottom-bar">
<div id="total">Total: 0 LKR</div>
<button class="next-btn" onclick="goCheckout()">NEXT</button>
</div>
